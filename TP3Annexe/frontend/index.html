<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP2 - Orchestration Docker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #status-indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4 text-center">
                    <h2 class="mb-4 text-primary">Interface Utilisateur</h2>
                    <hr>
                    <div class="my-4">
                        <p class="text-muted mb-2">Statut du Backend :</p>
                        <div id="loader" class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Chargement...</span>
                        </div>
                        <h4 id="out" class="mt-3 d-none text-success italic"></h4>
                    </div>
                    <div class="card-footer bg-transparent border-0">
                        <small class="text-muted">Projet Conteneurisation</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const outElement = document.getElementById('out');
        const loader = document.getElementById('loader');

        fetch('http://localhost:5000')
            .then(r => {
                if (!r.ok) throw new Error('Erreur réseau');
                return r.json();
            })
            .then(d => {
                loader.classList.add('d-none');
                outElement.innerText = d.message;
                outElement.classList.remove('d-none');
            })
            .catch(err => {
                loader.classList.add('d-none');
                outElement.innerText = "Impossible de joindre le backend";
                outElement.classList.replace('text-success', 'text-danger');
                outElement.classList.remove('d-none');
                console.error(err);
            });
    </script>
</body>
</html>
