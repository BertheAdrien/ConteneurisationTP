apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: backend-image:v1
          imagePullPolicy: Never # Force l'utilisation de l'image locale buildée avec Docker
        ports:
        - containerPort: 5000